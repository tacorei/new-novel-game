<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Script View - Visual Novel Maker</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        :root {
            --doc-bg: #f8f9fa;
            --doc-paper: #ffffff;
            --doc-text: #202124;
            --doc-border: #dadce0;
        }

        body {
            background-color: var(--doc-bg);
            color: var(--doc-text);
            font-family: 'Sawarabi Mincho', serif;
            /* Optional serif for script feel */
            padding: 0;
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .script-header {
            background: #fff;
            border-bottom: 1px solid var(--doc-border);
            padding: 0.5rem 1rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .paper-container {
            flex-grow: 1;
            padding: 2rem 1rem;
            display: flex;
            justify-content: center;
        }

        .paper {
            background: var(--doc-paper);
            box-shadow: 0 1px 3px rgba(60, 64, 67, 0.3), 0 4px 8px 3px rgba(60, 64, 67, 0.15);
            width: 100%;
            max-width: 800px;
            min-height: 1000px;
            padding: 3rem 4rem;
            box-sizing: border-box;
        }

        h1.title {
            font-family: inherit;
            font-size: 2rem;
            margin-bottom: 2rem;
            text-align: center;
            border-bottom: 2px solid #eee;
            padding-bottom: 1rem;
        }

        .scene-block {
            margin-bottom: 2.5rem;
            page-break-inside: avoid;
        }

        .scene-header {
            color: #70757a;
            font-size: 0.85rem;
            margin-bottom: 0.5rem;
            display: flex;
            justify-content: space-between;
            border-bottom: 1px dashed #eee;
        }

        .scene-text {
            line-height: 2;
            white-space: pre-wrap;
            font-size: 1.1rem;
        }

        .scene-note {
            margin-top: 0.5rem;
            color: #888;
            font-size: 0.8rem;
            font-style: italic;
        }

        @media print {

            .script-header,
            .btn-print {
                display: none;
            }

            body {
                background: #fff;
            }

            .paper {
                box-shadow: none;
                width: 100%;
                padding: 0;
            }
        }

        @media (max-width: 768px) {
            .paper {
                padding: 2rem;
            }
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Sawarabi+Mincho&display=swap" rel="stylesheet">
</head>

<body>
    <header class="script-header">
        <button onclick="location.href='editor.html'"
            style="background: #eee; color: #333; border: 1px solid #ccc; padding: 0.4rem 1rem;">← エディタへ</button>
        <div style="flex-grow: 1; font-weight: bold; color: #444;">台本プレビュー</div>
        <button class="btn-print" onclick="window.print()" style="background: var(--primary-color); color: white;">印刷 /
            PDF出力</button>
    </header>

    <div class="paper-container">
        <article class="paper" id="script-content">
            <h1 class="title">ノベル台本</h1>
            <div id="scenes-list">
                <!-- Scenes will be injected here -->
            </div>
        </article>
    </div>

    <script type="module">
        import NovelStorage from './js/storage.js';

        const scenes = NovelStorage.load();
        const container = document.getElementById('scenes-list');

        if (scenes.length === 0) {
            container.innerHTML = '<p style="text-align:center; color:#999;">シーンがありません。</p>';
        } else {
            scenes.forEach((scene, idx) => {
                const block = document.createElement('div');
                block.className = 'scene-block';

                block.innerHTML = `
                    <div class="scene-header">
                        <span>第 ${idx + 1} 場</span>
                        <span>設定：${scene.fade || 1.0}s フェード</span>
                    </div>
                    <div class="scene-text">${scene.text || '（テキストなし）'}</div>
                    ${scene.note ? `<div class="scene-note">メモ: ${scene.note}</div>` : ''}
                `;
                container.appendChild(block);
            });
        }
    </script>
</body>

</html>
