<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Play - Visual Novel Maker</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            background: #000;
            cursor: pointer;
            user-select: none;
        }

        #bg-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
            background: #000;
        }

        #bg-image {
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            /* slowZoom animation is defined in style.css */
        }

        .slow-zoom {
            animation: slowZoom 20s linear infinite alternate;
        }

        #ui-layer {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 800px;
            z-index: 10;
        }

        #text-box {
            padding: 2rem;
            min-height: 150px;
            font-size: 1.2rem;
            line-height: 1.8;
            color: #fff;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.8);
            position: relative;
        }

        #text-content {
            white-space: pre-wrap;
        }

        .click-hint {
            position: absolute;
            bottom: 1rem;
            right: 1.5rem;
            font-size: 0.8rem;
            opacity: 0.6;
            animation: blink 1.5s infinite;
        }

        @keyframes blink {

            0%,
            100% {
                opacity: 0.2;
            }

            50% {
                opacity: 0.8;
            }
        }

        #overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            transition: opacity 1s;
            pointer-events: none;
        }

        #end-screen {
            display: none;
            text-align: center;
        }

        /* Choice UI */
        #choice-layer {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: none;
            flex-direction: column;
            gap: 1rem;
            width: 80%;
            max-width: 400px;
            z-index: 50;
        }

        .choice-btn {
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid var(--accent-color);
            color: white;
            padding: 1rem 2rem;
            text-align: center;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.2s;
            backdrop-filter: blur(5px);
            font-size: 1.1rem;
        }

        .choice-btn:hover {
            background: var(--accent-color);
            color: black;
            transform: scale(1.05);
        }

        /* Character Sprites & Name Label */
        .sprite-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 5;
            display: flex;
            align-items: flex-end;
            justify-content: center;
        }

        .character-sprite {
            position: absolute;
            bottom: 0;
            height: 85vh;
            /* 画面の85%程度の高さ */
            transform: translateX(-50%);
            object-fit: contain;
            transition: opacity 0.5s;
        }

        .name-label {
            position: absolute;
            top: -1.5rem;
            left: 2rem;
            background: var(--primary-color);
            color: white;
            padding: 0.3rem 1.5rem;
            border-radius: 4px;
            font-size: 1rem;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
            z-index: 11;
        }
    </style>
</head>

<body id="play-body">
    <div id="overlay">
        <div id="end-screen">
            <h1 style="font-size: 3rem; margin-bottom: 3rem; letter-spacing: 0.5rem;">THE END</h1>
            <button onclick="location.href='editor.html'"
                style="padding: 1.5rem 3rem; font-size: 1.2rem; background: var(--accent-color); color: #000;">エディタに戻る</button>
        </div>
    </div>

    <button onclick="location.href='editor.html'"
        style="position:fixed; top:1.5rem; left:1.5rem; z-index:1000; background:rgba(0,0,0,0.6); color:white; border:1px solid rgba(255,255,255,0.4); padding:0.6rem 1.2rem; border-radius:30px; font-size:13px; cursor:pointer; backdrop-filter:blur(10px); box-shadow: 0 4px 15px rgba(0,0,0,0.5);">←
        エディタに戻る</button>

    <div id="bg-container">
        <div id="bg-image"></div>
    </div>

    <div id="sprite-layer" class="sprite-layer"></div>

    <div id="ui-layer">
        <div id="text-box" class="glass">
            <div id="name-label" class="name-label" style="display: none;"></div>
            <div id="text-content"></div>
            <div class="click-hint" id="click-hint">▼ Click or Tap</div>
        </div>
    </div>

    <div id="choice-layer"></div>

    <script type="module">
        import NovelStorage from './js/storage.js';

        let scenes = [];
        let characters = [];
        let currentIdx = 0;
        let isTransitioning = false;

        const bgImage = document.getElementById('bg-image');
        const textContent = document.getElementById('text-content');
        const overlay = document.getElementById('overlay');
        const endScreen = document.getElementById('end-screen');
        const choiceLayer = document.getElementById('choice-layer');
        const clickHint = document.getElementById('click-hint');

        let bgm = null;

        function renderScene() {
            const scene = scenes[currentIdx];
            const fadeSeconds = scene.fade || 1.0;
            const fadeMs = fadeSeconds * 1000;

            isTransitioning = true;
            choiceLayer.style.display = 'none';

            overlay.style.transition = `opacity ${fadeSeconds}s`;
            overlay.style.opacity = 1;

            setTimeout(() => {
                bgImage.style.backgroundImage = `url(${scene.bg || ''})`;
                textContent.textContent = scene.text;

                const nameLabel = document.getElementById('name-label');
                if (scene.showName && scene.speaker) {
                    nameLabel.textContent = scene.speaker;
                    nameLabel.style.display = 'block';
                } else {
                    nameLabel.style.display = 'none';
                }

                const spriteLayer = document.getElementById('sprite-layer');
                spriteLayer.innerHTML = '';
                if (scene.characters) {
                    const sorted = [...scene.characters].sort((a, b) => (a.z || 0) - (b.z || 0));
                    sorted.forEach(sc => {
                        const charDef = characters.find(c => c.id === sc.id);
                        if (charDef) {
                            let imgSrc = charDef.img;
                            if (sc.expression && charDef.expressions) {
                                const exp = charDef.expressions.find(e => e.name === sc.expression);
                                if (exp) imgSrc = exp.img;
                            }
                            if (imgSrc) {
                                const img = document.createElement('img');
                                img.src = imgSrc;
                                img.className = 'character-sprite';
                                img.style.left = `${sc.x}%`;
                                img.style.bottom = `${100 - sc.y}%`;
                                img.style.zIndex = sc.z || 0;
                                spriteLayer.appendChild(img);
                            }
                        }
                    });
                }

                if (scene.audio === '停止' || scene.audio === 'stop') {
                    if (bgm) { bgm.pause(); bgm = null; }
                } else if (scene.audio) {
                    if (!bgm || bgm.src !== new URL(scene.audio, window.location.href).href) {
                        if (bgm) bgm.pause();
                        bgm = new Audio(scene.audio);
                        bgm.loop = true;
                        bgm.play().catch(e => console.log("BGM play blocked", e));
                    }
                }

                if (scene.se) {
                    const se = new Audio(scene.se);
                    se.play().catch(e => console.log("SE play blocked", e));
                }

                bgImage.classList.remove('slow-zoom');
                void bgImage.offsetWidth;
                bgImage.classList.add('slow-zoom');

                overlay.style.opacity = 0;
            }, fadeMs);
        }

        function showChoices(choices) {
            choiceLayer.innerHTML = '';
            choiceLayer.style.display = 'flex';
            clickHint.style.display = 'none';
            choices.forEach(c => {
                const btn = document.createElement('div');
                btn.className = 'choice-btn';
                btn.textContent = c.text;
                btn.onclick = (e) => {
                    e.stopPropagation();
                    // Supports both direct indices and potentially ID strings in future
                    const target = parseInt(c.target);
                    if (!isNaN(target)) {
                        currentIdx = target;
                    } else {
                        // fallback or search by title if needed
                        console.warn("Invalid jump target:", c.target);
                    }
                    renderScene();
                };
                choiceLayer.appendChild(btn);
            });
        }

        overlay.ontransitionend = () => {
            if (overlay.style.opacity === "0") {
                isTransitioning = false;
                const scene = scenes[currentIdx];
                if (scene.choices && scene.choices.length > 0) {
                    showChoices(scene.choices);
                } else {
                    clickHint.style.display = 'block';
                }
            }
        };

        function next() {
            if (isTransitioning) return;
            const scene = scenes[currentIdx];
            if (scene.choices && scene.choices.length > 0) return;

            // Handle custom jump
            if (scene.nextScene !== undefined && scene.nextScene !== "" && scene.nextScene !== null) {
                const target = parseInt(scene.nextScene);
                if (!isNaN(target)) {
                    currentIdx = target;
                    renderScene();
                    return;
                }
            }

            currentIdx++;
            if (currentIdx < scenes.length) {
                renderScene();
            } else {
                finish();
            }
        }

        function finish() {
            isTransitioning = true;
            overlay.style.pointerEvents = 'auto';
            overlay.style.opacity = 1;
            setTimeout(() => {
                endScreen.style.display = 'block';
            }, 1000);
        }

        async function init() {
            const projectData = await NovelStorage.load();
            scenes = projectData.scenes || [];
            characters = projectData.characters || [];
            if (scenes.length === 0) {
                alert('データがありません。');
                window.location.href = 'index.html';
                return;
            }
            renderScene();
        }

        document.body.onclick = next;
        init();
    </script>
</body>

</html>
