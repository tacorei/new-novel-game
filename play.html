<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Play - Visual Novel Maker</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            background: #000;
            cursor: pointer;
            user-select: none;
        }

        #bg-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
            background: #000;
        }

        #bg-image {
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            /* slowZoom animation is defined in style.css */
        }

        .slow-zoom {
            animation: slowZoom 20s linear infinite alternate;
        }

        #ui-layer {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 800px;
            z-index: 10;
        }

        #text-box {
            padding: 2rem;
            min-height: 150px;
            font-size: 1.2rem;
            line-height: 1.8;
            color: #fff;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.8);
            position: relative;
        }

        #text-content {
            white-space: pre-wrap;
        }

        .click-hint {
            position: absolute;
            bottom: 1rem;
            right: 1.5rem;
            font-size: 0.8rem;
            opacity: 0.6;
            animation: blink 1.5s infinite;
        }

        @keyframes blink {

            0%,
            100% {
                opacity: 0.2;
            }

            50% {
                opacity: 0.8;
            }
        }

        #overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            transition: opacity 1s;
            pointer-events: none;
        }

        #end-screen {
            display: none;
            text-align: center;
        }
    </style>
</head>

<body id="play-body">
    <div id="overlay">
        <div id="end-screen">
            <h1 style="margin-bottom: 2rem;">THE END</h1>
            <button onclick="location.href='index.html'">トップに戻る</button>
        </div>
    </div>

    <div id="bg-container">
        <div id="bg-image"></div>
    </div>

    <div id="ui-layer">
        <div id="text-box" class="glass">
            <div id="text-content"></div>
            <div class="click-hint">▼ Click or Tap</div>
        </div>
    </div>

    <script type="module">
        import NovelStorage from './js/storage.js';

        const scenes = NovelStorage.load();
        let currentIdx = 0;

        const bgImage = document.getElementById('bg-image');
        const textContent = document.getElementById('text-content');
        const overlay = document.getElementById('overlay');
        const endScreen = document.getElementById('end-screen');

        if (scenes.length === 0) {
            alert('データがありません。');
            window.location.href = 'index.html';
        }

        function renderScene() {
            const scene = scenes[currentIdx];

            // FADEOUT effect before change
            overlay.style.opacity = 1;

            setTimeout(() => {
                // Change Content
                bgImage.style.backgroundImage = `url(${scene.bg || ''})`;
                textContent.textContent = scene.text;

                // Restart zoom animation to avoid jump
                bgImage.classList.remove('slow-zoom');
                void bgImage.offsetWidth; // trigger reflow
                bgImage.classList.add('slow-zoom');

                // FADEIN
                overlay.style.opacity = 0;
            }, 500);
        }

        function next() {
            currentIdx++;
            if (currentIdx < scenes.length) {
                renderScene();
            } else {
                finish();
            }
        }

        function finish() {
            overlay.style.pointerEvents = 'auto';
            overlay.style.opacity = 1;
            setTimeout(() => {
                endScreen.style.display = 'block';
            }, 500);
        }

        document.body.onclick = next;

        // Init
        setTimeout(() => {
            renderScene();
        }, 100);
    </script>
</body>

</html>
