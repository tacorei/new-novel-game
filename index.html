<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visual Novel Maker</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="manifest" href="manifest.webmanifest">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            height: auto;
            /* allow scrolling if content grows */
            margin: 0;
            background: linear-gradient(135deg, #0d0d0d 0%, #1a1a2e 100%);
            overflow-y: auto;
            /* permit vertical scroll */
            overflow-x: hidden;
            color: #fff;
            padding: 1rem;
            box-sizing: border-box;
        }

        /* override style.css for home screen centering */
        #app {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            min-height: 100vh;
            height: auto;
            /* allow growth */
        }

        .container {
            width: 100%;
            max-width: 600px;
            padding: 3rem 2rem;
            text-align: center;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            background: linear-gradient(45deg, var(--primary-color), var(--accent-color));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            margin-bottom: 2rem;
            line-height: 1.6;
            color: #aaa;
        }

        .menu {
            display: grid;
            gap: 1rem;
        }

        .menu button {
            width: 100%;
            padding: 1rem;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <div id="app" class="fade-in">
        <div class="container glass">
            <h1>Visual Novel Maker</h1>
            <p>
                あなただけの物語を。作品が増えても安心の管理システム。
            </p>

            <div id="project-list-section" style="margin-bottom: 2rem; text-align: left;">
                <h3 style="font-size: 1rem; color: var(--accent-color); margin-bottom: 1rem;">作品一覧</h3>
                <div id="project-list"
                    style="display: grid; gap: 0.8rem; max-height: 300px; overflow-y: auto; padding-right: 0.5rem;">
                    <!-- Projects will be listed here -->
                </div>
            </div>

            <div class="menu">
                <button id="btn-new" style="background: var(--primary-color);">✨ 新しい作品を作る</button>
                <button id="btn-sample" style="background: #333; font-size: 0.8rem; margin-top: 0.5rem;">🎁
                    サンプルを読み込む</button>
            </div>
        </div>
    </div>

    <script type="module">
        import NovelStorage from './js/storage.js';

        const projectList = document.getElementById('project-list');
        const btnNew = document.getElementById('btn-new');
        const btnSample = document.getElementById('btn-sample');

        function renderProjects() {
            const projects = NovelStorage.getProjects();
            const activeId = NovelStorage.getActiveProjectId();

            projectList.innerHTML = '';

            if (projects.length === 0) {
                projectList.innerHTML = '<p style="text-align:center; font-size: 0.8rem; color:#666;">作品がまだありません</p>';
                return;
            }

            projects.forEach(p => {
                const item = document.createElement('div');
                item.style = `
                    background: rgba(255,255,255,0.05);
                    border: 1px solid ${p.id === activeId ? 'var(--accent-color)' : 'var(--box-border)'};
                    padding: 1rem;
                    border-radius: 12px;
                    display: flex;
                    justify-content: space-between;
                    align-items: center;
                    cursor: pointer;
                    transition: all 0.2s;
                    box-shadow: ${p.id === activeId ? '0 0 15px rgba(0, 243, 255, 0.2)' : 'none'};
                `;

                item.innerHTML = `
                    <div>
                        <div style="font-weight: bold; font-size: 0.95rem; color: #fff;">${p.name}</div>
                        <div style="font-size: 0.7rem; color: #666; margin-top: 0.2rem;">最終更新: ${new Date(p.updatedAt).toLocaleString()}</div>
                    </div>
                    <div style="display: flex; gap: 0.5rem;">
                        <button class="btn-edit" data-id="${p.id}" style="padding: 0.4rem 0.8rem; font-size: 0.75rem;">編集</button>
                        <button class="btn-play" data-id="${p.id}" style="padding: 0.4rem 0.8rem; font-size: 0.75rem; background: var(--accent-color); color: black;">プレイ</button>
                        <button class="btn-del" data-id="${p.id}" style="padding: 0.4rem; font-size: 0.75rem; background: transparent; color: #666; width: auto; border: none;">🗑</button>
                    </div>
                `;

                item.onclick = () => {
                    NovelStorage.setActiveProjectId(p.id);
                    renderProjects();
                };

                const editBtn = item.querySelector('.btn-edit');
                editBtn.onclick = (e) => {
                    e.stopPropagation();
                    NovelStorage.setActiveProjectId(p.id);
                    window.location.href = 'editor.html';
                };

                const playBtn = item.querySelector('.btn-play');
                playBtn.onclick = (e) => {
                    e.stopPropagation();
                    NovelStorage.setActiveProjectId(p.id);
                    window.location.href = 'play.html';
                };

                const delBtn = item.querySelector('.btn-del');
                delBtn.onclick = (e) => {
                    e.stopPropagation();
                    if (confirm(`「${p.name}」を削除してもよろしいですか？`)) {
                        NovelStorage.deleteProject(p.id);
                        renderProjects();
                    }
                };

                projectList.appendChild(item);
            });
        }

        btnNew.onclick = () => {
            const name = prompt('作品名を入力してください', '無題の物語');
            if (name) {
                NovelStorage.createProject(name);
                window.location.href = 'editor.html';
            }
        };

        btnSample.onclick = () => {
            NovelStorage.loadSample();
            renderProjects();
        };

        // Initialize
        renderProjects();

        // Register Service Worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('SW registered'))
                    .catch(err => console.log('SW registration failed', err));
            });
        }
    </script>
</body>

</html>
