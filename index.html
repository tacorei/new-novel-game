<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visual Novel Maker</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="manifest" href="manifest.webmanifest">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            height: auto;
            margin: 0;
            background: linear-gradient(135deg, #0d0d0d 0%, #1a1a2e 100%);
            overflow-y: auto;
            overflow-x: hidden;
            color: #fff;
            padding: 1rem;
            box-sizing: border-box;
        }

        #app {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            min-height: 100vh;
            height: auto;
        }

        .container {
            width: 100%;
            max-width: 600px;
            padding: 3rem 2rem;
            text-align: center;
            transition: max-width 0.3s ease-in-out;
        }

        @media (min-width: 1024px) {
            .container {
                max-width: 1200px;
            }

            #project-list {
                display: grid !important;
                grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
                gap: 1.5rem !important;
                max-height: none !important;
                padding: 1rem 0 !important;
            }

            .project-item {
                flex-direction: column !important;
                align-items: flex-start !important;
                text-align: left;
                gap: 1.5rem;
                padding: 1.5rem !important;
            }

            .project-item .controls {
                width: 100%;
                justify-content: flex-end;
            }
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            background: linear-gradient(45deg, var(--primary-color), var(--accent-color));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            margin-bottom: 2rem;
            line-height: 1.6;
            color: #aaa;
        }

        .menu {
            display: grid;
            gap: 1rem;
        }

        .menu button {
            width: 100%;
            padding: 1rem;
            font-weight: bold;
        }

        #auth-container {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        #auth-login {
            display: flex;
            align-items: center;
        }

        #btn-login {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid var(--box-border);
            color: #ccc;
            padding: 0.6rem 1.2rem;
            border-radius: 30px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.2s;
            width: auto;
        }

        #btn-login:hover {
            background: rgba(255, 255, 255, 0.15);
            color: #fff;
            border-color: var(--accent-color);
        }

        #auth-user {
            display: none;
            align-items: center;
            gap: 0.8rem;
        }

        #auth-user-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: 2px solid var(--accent-color);
            object-fit: cover;
        }

        #auth-user-name {
            font-size: 0.85rem;
            color: #ccc;
        }

        #btn-logout {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #888;
            padding: 0.4rem 0.8rem;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.7rem;
            transition: all 0.2s;
            width: auto;
        }

        #btn-logout:hover {
            border-color: #d32f2f;
            color: #d32f2f;
        }

        #cloud-status {
            font-size: 0.7rem;
            color: #555;
            text-align: right;
            margin-top: 0.3rem;
        }
    </style>
</head>

<body>
    <div id="app" class="fade-in">
        <div class="container glass">
            <!-- 認証UI -->
            <div id="auth-container">
                <div id="auth-login">
                    <button id="btn-login">🔐 Googleでログイン</button>
                </div>
                <div id="auth-user">
                    <img id="auth-user-avatar" src="" alt="avatar">
                    <span id="auth-user-name"></span>
                    <button id="btn-logout">ログアウト</button>
                </div>
            </div>
            <div id="cloud-status">同期状態を確認中...</div>

            <h1>Visual Novel Maker</h1>
            <p>
                あなただけの物語を。作品が増えても安心の管理システム。
            </p>

            <div id="project-list-section" style="margin-bottom: 2rem; text-align: left;">
                <h3 style="font-size: 1rem; color: var(--accent-color); margin-bottom: 1rem;">作品一覧</h3>
                <div id="project-list"
                    style="display: grid; gap: 0.8rem; max-height: 300px; overflow-y: auto; padding-right: 0.5rem;">
                    <!-- Projects will be listed here -->
                </div>
            </div>

            <div id="sync-queue-section" style="margin-bottom: 2rem; text-align: left;">
                <div style="display:flex; align-items:center; justify-content:space-between; gap:1rem; margin-bottom: 1rem;">
                    <h3 style="font-size: 1rem; color: var(--accent-color); margin: 0;">同期キュー</h3>
                    <button id="btn-retry-sync"
                        style="background: rgba(255,255,255,0.08); border: 1px solid var(--box-border); color: #ccc; width: auto; padding: 0.45rem 0.8rem; font-size: 0.75rem;">再試行</button>
                </div>
                <div id="sync-queue-list"
                    style="display: grid; gap: 0.6rem; max-height: 220px; overflow-y: auto; padding-right: 0.5rem;">
                </div>
            </div>

            <div class="menu">
                <button id="btn-new" style="background: var(--primary-color);">✨ 新しい作品を作る</button>
                <button id="btn-sample" style="background: #333; font-size: 0.8rem; margin-top: 0.5rem;">🎁
                    サンプルを読み込む</button>
            </div>
        </div>
    </div>

    <!-- New Project Modal -->
    <div id="modal-new-project" class="modal-overlay" style="display: none;">
        <div class="modal-content glass">
            <h2 style="margin-top: 0;">✨ 新しい作品を作る</h2>

            <div style="text-align: left; margin-bottom: 1.5rem;">
                <label
                    style="display: block; font-size: 0.8rem; color: var(--accent-color); margin-bottom: 0.5rem;">作品のタイトル</label>
                <input type="text" id="new-project-title" placeholder="無題の物語"
                    style="width: 100%; padding: 0.8rem; background: rgba(0,0,0,0.3); border: 1px solid var(--box-border); border-radius: 8px; color: #fff; box-sizing: border-box;">
            </div>

            <div style="text-align: left; margin-bottom: 1.5rem;">
                <label
                    style="display: block; font-size: 0.8rem; color: var(--accent-color); margin-bottom: 0.5rem;">アセットの一括登録
                    (立ち絵など)</label>
                <div
                    style="background: rgba(255,255,255,0.05); padding: 1rem; border-radius: 8px; border: 1px dashed var(--box-border); text-align: center;">
                    <input type="file" id="bulk-assets" multiple accept="image/*" style="display: none;">
                    <button onclick="document.getElementById('bulk-assets').click()"
                        style="background: #444; font-size: 0.8rem; width: auto; padding: 0.5rem 1rem;">📁
                        ファイルを選択</button>
                    <div id="asset-count" style="font-size: 0.7rem; color: #666; margin-top: 0.5rem;">選択されていません</div>
                </div>
                <p style="font-size: 0.65rem; color: #888; margin-top: 0.5rem; text-align: center;">
                    ※選択した画像は自動的にキャラクターパレットに登録されます。
                </p>
            </div>

            <div style="display: grid; gap: 1rem;">
                <button id="create-scratch" style="background: var(--primary-color);">🚀 白紙から作る</button>
                <button id="create-sample" style="background: #333; font-size: 0.8rem;">🎁 サンプル（お手本）から作る</button>
                <button id="close-modal"
                    style="background: transparent; color: #666; border: none; font-size: 0.8rem; margin-top: 0.5rem;">キャンセル</button>
            </div>
        </div>
    </div>

    <style>
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(5px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            width: 90%;
            max-width: 450px;
            padding: 2.5rem;
            text-align: center;
            animation: modalFadeIn 0.3s ease-out;
        }

        @keyframes modalFadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        input:focus {
            outline: none;
            border-color: var(--accent-color) !important;
            box-shadow: 0 0 10px rgba(0, 243, 255, 0.2);
        }
    </style>

    <script type="module">
        import NovelStorage from './js/storage.js';
        import Auth from './js/auth.js';

        const projectList = document.getElementById('project-list');
        const syncQueueList = document.getElementById('sync-queue-list');
        const cloudStatus = document.getElementById('cloud-status');
        const btnNew = document.getElementById('btn-new');
        const btnSample = document.getElementById('btn-sample');

        const modalNew = document.getElementById('modal-new-project');
        const inputTitle = document.getElementById('new-project-title');
        const inputAssets = document.getElementById('bulk-assets');
        const labelAssetCount = document.getElementById('asset-count');
        const btnCreateScratch = document.getElementById('create-scratch');
        const btnCreateSample = document.getElementById('create-sample');
        const btnCloseModal = document.getElementById('close-modal');
        const btnRetrySync = document.getElementById('btn-retry-sync');

        let pendingSyncCount = 0;

        function setCloudStatus(message, color) {
            if (!cloudStatus) return;
            const suffix = pendingSyncCount > 0 ? ` (${pendingSyncCount}件保留)` : '';
            cloudStatus.textContent = `${message}${suffix}`;
            cloudStatus.style.color = color;
        }

        async function refreshPendingSyncCount() {
            pendingSyncCount = await NovelStorage.getPendingSyncCount();
        }

        async function renderSyncQueue() {
            if (!syncQueueList) return;
            const entries = await NovelStorage.getPendingSyncEntries();
            syncQueueList.innerHTML = '';

            if (entries.length === 0) {
                syncQueueList.innerHTML = '<p style="text-align:center; font-size: 0.8rem; color:#666;">保留中の同期はありません</p>';
                return;
            }

            entries.forEach((entry) => {
                const item = document.createElement('div');
                const hasProject = !!NovelStorage.getProjectById(entry.projectId);
                const label = entry.operation === 'delete'
                    ? '削除'
                    : entry.operation === 'save'
                        ? '保存'
                        : '更新';
                item.style = `
                    background: rgba(255,255,255,0.04);
                    border: 1px solid var(--box-border);
                    border-radius: 10px;
                    padding: 0.7rem 0.9rem;
                    display: flex;
                    justify-content: space-between;
                    gap: 1rem;
                    align-items: center;
                `;
                item.innerHTML = `
                    <div style="min-width: 0;">
                        <div style="font-size: 0.8rem; color: var(--accent-color);">${label}</div>
                        <div style="font-size: 0.9rem; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">
                            ${entry.title || entry.projectId}
                        </div>
                    </div>
                    <div style="display:flex; align-items:center; gap:0.5rem; flex-wrap:wrap; justify-content:flex-end;">
                        <div style="font-size: 0.72rem; color: #888; white-space: nowrap;">
                            ${entry.updatedAt ? new Date(entry.updatedAt).toLocaleString() : ''}
                        </div>
                        ${hasProject ? '<button class="btn-sync-open" style="background:#444; color:#fff; border:1px solid var(--box-border); width:auto; padding:0.35rem 0.6rem; font-size:0.72rem;">移動</button>' : ''}
                        <button class="btn-sync-retry" style="background:rgba(255,255,255,0.08); color:#fff; border:1px solid var(--box-border); width:auto; padding:0.35rem 0.6rem; font-size:0.72rem;">再試行</button>
                        <button class="btn-sync-discard" style="background:transparent; color:#ff8a80; border:1px solid rgba(255,138,128,0.35); width:auto; padding:0.35rem 0.6rem; font-size:0.72rem;">破棄</button>
                    </div>
                `;
                const openBtn = item.querySelector('.btn-sync-open');
                if (openBtn) {
                    openBtn.onclick = () => {
                        NovelStorage.setActiveProjectId(entry.projectId);
                        window.location.href = 'editor.html';
                    };
                }
                const retryBtn = item.querySelector('.btn-sync-retry');
                if (retryBtn) {
                    retryBtn.onclick = async () => {
                        retryBtn.disabled = true;
                        try {
                            await NovelStorage.retryPendingSync();
                            await refreshPendingSyncCount();
                            await renderSyncQueue();
                        } catch (error) {
                            console.error('Retry failed:', error);
                            setCloudStatus('同期の再試行に失敗しました', '#f44336');
                        } finally {
                            retryBtn.disabled = false;
                        }
                    };
                }
                const discardBtn = item.querySelector('.btn-sync-discard');
                if (discardBtn) {
                    discardBtn.onclick = async () => {
                        if (!confirm('この保留中の同期を破棄しますか？')) return;
                        discardBtn.disabled = true;
                        try {
                            await NovelStorage.discardPendingSync(entry.projectId);
                            await refreshPendingSyncCount();
                            await renderSyncQueue();
                        } catch (error) {
                            console.error('Discard failed:', error);
                            setCloudStatus('保留中の同期を破棄できませんでした', '#f44336');
                        } finally {
                            discardBtn.disabled = false;
                        }
                    };
                }
                syncQueueList.appendChild(item);
            });
        }

        async function initializeHome() {
            try {
                const isCloudEnabled = await NovelStorage.initCloud();
                await Auth.init();
                await refreshPendingSyncCount();
                await renderSyncQueue();
                if (!isCloudEnabled) {
                    setCloudStatus('Local Only', '#ff9800');
                    return;
                }
                if (!navigator.onLine) {
                    setCloudStatus('Offline / 同期待ちを保持中', '#ff9800');
                    return;
                }
                setCloudStatus(Auth.getUser() ? 'Cloud Connected' : 'Not Signed In', Auth.getUser() ? '#4caf50' : '#ff9800');
            } catch (error) {
                console.error('Failed to initialize home screen:', error);
                setCloudStatus('Offline', '#f44336');
            }
        }

        window.addEventListener('novel-storage-status', async (event) => {
            const { state, message } = event.detail || {};
            await refreshPendingSyncCount();
            await renderSyncQueue();
            if (state === 'queued') {
                setCloudStatus(message || '同期待ち', '#ff9800');
            } else if (state === 'synced') {
                setCloudStatus(Auth.getUser() ? 'Cloud Connected' : '同期完了', '#4caf50');
            } else if (state === 'paused') {
                setCloudStatus(message || 'ログイン後に同期します', '#ff9800');
            } else if (state === 'discarded') {
                setCloudStatus(message || '同期を破棄しました', '#ff9800');
            } else if (state === 'error') {
                setCloudStatus(message || '同期エラー', '#f44336');
            }
        });

        window.addEventListener('offline', () => {
            setCloudStatus('Offline / 同期待ちを保持中', '#ff9800');
        });

        window.addEventListener('online', () => {
            setCloudStatus(Auth.getUser() ? 'Cloud Connected' : 'Online', '#4caf50');
        });

        if (btnRetrySync) {
            btnRetrySync.onclick = async () => {
                btnRetrySync.disabled = true;
                try {
                    await NovelStorage.retryPendingSync();
                    await refreshPendingSyncCount();
                    await renderSyncQueue();
                } catch (error) {
                    console.error('Bulk retry failed:', error);
                    setCloudStatus('同期の再試行に失敗しました', '#f44336');
                } finally {
                    btnRetrySync.disabled = false;
                }
            };
        }

        function renderProjects() {
            const projects = NovelStorage.getProjects();
            const activeId = NovelStorage.getActiveProjectId();

            projectList.innerHTML = '';

            if (projects.length === 0) {
                projectList.innerHTML = '<p style="text-align:center; font-size: 0.8rem; color:#666;">作品がまだありません</p>';
                return;
            }

            projects.forEach(p => {
                const item = document.createElement('div');
                item.className = 'project-item';
                item.style = `
                    background: rgba(255,255,255,0.05);
                    border: 1px solid ${p.id === activeId ? 'var(--accent-color)' : 'var(--box-border)'};
                    padding: 1rem;
                    border-radius: 12px;
                    display: flex;
                    justify-content: space-between;
                    align-items: center;
                    cursor: pointer;
                    transition: all 0.2s;
                    box-shadow: ${p.id === activeId ? '0 0 15px rgba(0, 243, 255, 0.2)' : 'none'};
                `;

                item.innerHTML = `
                    <div style="flex: 1;">
                        <div style="font-weight: bold; font-size: 1.1rem; color: #fff;">${p.title}</div>
                        <div style="font-size: 0.75rem; color: #888; margin-top: 0.4rem;">最終更新: ${new Date(p.updatedAt).toLocaleString()}</div>
                    </div>
                    <div class="controls" style="display: flex; gap: 0.5rem;">
                        <button class="btn-edit" data-id="${p.id}" style="padding: 0.5rem 1rem; font-size: 0.8rem;">編集</button>
                        <button class="btn-rename" data-id="${p.id}" style="padding: 0.5rem 0.8rem; font-size: 0.8rem; background: #444;">名前</button>
                        <button class="btn-play" data-id="${p.id}" style="padding: 0.5rem 1rem; font-size: 0.8rem; background: var(--accent-color); color: black;">Play</button>
                        <button class="btn-del" data-id="${p.id}" style="padding: 0.4rem; font-size: 0.8rem; background: transparent; color: #666; width: auto; border: none;">🗑</button>
                    </div>
                `;

                item.onclick = () => {
                    NovelStorage.setActiveProjectId(p.id);
                    renderProjects();
                };

                const editBtn = item.querySelector('.btn-edit');
                editBtn.onclick = (e) => {
                    e.stopPropagation();
                    NovelStorage.setActiveProjectId(p.id);
                    window.location.href = 'editor.html';
                };

                const renameBtn = item.querySelector('.btn-rename');
                renameBtn.onclick = async (e) => {
                    e.stopPropagation();
                    const nextTitle = prompt('新しいタイトルを入力してください', p.title);
                    if (nextTitle === null) return;
                    try {
                        await NovelStorage.renameProject(p.id, nextTitle);
                        await refreshPendingSyncCount();
                        await renderSyncQueue();
                        renderProjects();
                    } catch (error) {
                        console.error('Rename failed:', error);
                        setCloudStatus('タイトル変更に失敗しました', '#f44336');
                    }
                };

                const playBtn = item.querySelector('.btn-play');
                playBtn.onclick = (e) => {
                    e.stopPropagation();
                    NovelStorage.setActiveProjectId(p.id);
                    window.location.href = 'play.html';
                };

                const delBtn = item.querySelector('.btn-del');
                delBtn.onclick = async (e) => {
                    e.stopPropagation();
                    if (confirm(`「${p.title}」を削除してもよろしいですか？`)) {
                        try {
                            await NovelStorage.deleteProject(p.id);
                            await refreshPendingSyncCount();
                            await renderSyncQueue();
                        } catch (error) {
                            console.error('Delete failed:', error);
                            setCloudStatus('削除の同期に失敗しました', '#f44336');
                        }
                        renderProjects();
                    }
                };

                projectList.appendChild(item);
            });
        }

        if (btnNew) {
            btnNew.onclick = () => {
                if (inputTitle) inputTitle.value = '';
                if (inputAssets) inputAssets.value = '';
                if (labelAssetCount) labelAssetCount.textContent = '選択されていません';
                if (modalNew) modalNew.style.display = 'flex';
            };
        }

        if (btnCloseModal) {
            btnCloseModal.onclick = () => {
                if (modalNew) modalNew.style.display = 'none';
            };
        }

        if (inputAssets) {
            inputAssets.onchange = (e) => {
                const count = e.target.files.length;
                if (labelAssetCount) labelAssetCount.textContent = count > 0 ? `${count} 個のファイルを選択中` : '選択されていません';
            };
        }

        async function processAssets() {
            if (!inputAssets) return [];
            const files = Array.from(inputAssets.files);
            const characters = [];
            for (const file of files) {
                const dataUrl = await new Promise(resolve => {
                    const reader = new FileReader();
                    reader.onload = (ev) => resolve(ev.target.result);
                    reader.readAsDataURL(file);
                });
                characters.push({
                    id: 'char_' + Date.now() + Math.random().toString(36).substr(2, 5),
                    name: file.name.split('.')[0],
                    img: dataUrl,
                    expressions: []
                });
            }
            return characters;
        }

        if (btnCreateScratch) {
            btnCreateScratch.onclick = async () => {
                const title = (inputTitle ? inputTitle.value.trim() : '') || '無題の物語';
                const characters = await processAssets();
                NovelStorage.createProject(title, false);

                if (characters.length > 0) {
                    const projectData = await NovelStorage.load();
                    await NovelStorage.save(projectData.scenes, characters);
                }

                window.location.href = 'editor.html';
            };
        }

        if (btnCreateSample) {
            btnCreateSample.onclick = async () => {
                const title = (inputTitle ? inputTitle.value.trim() : '') || 'サンプルプロジェクト';
                await NovelStorage.loadSample(title);
                window.location.href = 'editor.html';
            };
        }

        if (btnSample) {
            btnSample.onclick = async () => {
                await NovelStorage.loadSample();
                await refreshPendingSyncCount();
                await renderSyncQueue();
                renderProjects();
            };
        }

        await initializeHome();
        renderProjects();

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(() => console.log('SW registered'))
                    .catch(err => console.log('SW registration failed', err));
            });
        }
    </script>
</body>

</html>
